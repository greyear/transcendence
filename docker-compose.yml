services:

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--configFile=/traefik/traefik.yml"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/traefik.yml:/traefik/traefik.yml:ro"
      - "./traefik/dynamic.yml:/traefik/dynamic.yml:ro"
      - "./certs:/certs:ro"

    networks:
      - transcendence-network

  auth-db:
    image: mongo:6
    container_name: auth-mongo
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword

    ports:
      - "27017:27017"

    networks:
      - transcendence-network

  core-db:
    image: postgres:15
    container_name: core-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: core_user
      POSTGRES_PASSWORD: core_password

    ports:
      - "5433:5432"

    volumes:
      - core_pg_data:/var/lib/postgresql/data
      - ./backend/infrastructure/postgres/core/01-init-core.sql:/docker-entrypoint-initdb.d/01-init-core.sql
      - ./backend/infrastructure/postgres/core/02-seed-core.sql:/docker-entrypoint-initdb.d/02-seed-core.sql

    networks:
      - transcendence-network

  notification-db:
    image: postgres:15
    container_name: notification-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_password

    ports:
      - "5434:5432"

    volumes:
      - notification_pg_data:/var/lib/postgresql/data

    networks:
      - transcendence-network

  search-db:
    image: pgvector/pgvector:pg15
    container_name: search-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: search_db
      POSTGRES_USER: search_user
      POSTGRES_PASSWORD: search_password

    ports:
      - "5435:5432"

    volumes:
      - search_pg_data:/var/lib/postgresql/data
      - ./backend/infrastructure/postgres/search/01-init-search.sql:/docker-entrypoint-initdb.d/01-init-search.sql

    networks:
      - transcendence-network

  api-gateway:
    build:
      context: ./backend/services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped

    expose:
      - "3000"

    environment:
      NODE_ENV: development
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      CORE_SERVICE_URL: http://core-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3003
      SEARCH_SERVICE_URL: http://search-service:8000

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway-https.rule=Host(`localhost`)"
      - "traefik.http.routers.gateway-https.entrypoints=websecure"
      - "traefik.http.routers.gateway-https.tls=true"
      - "traefik.http.services.gateway.loadbalancer.server.port=3000"

    depends_on:
      - auth-service
      - core-service
      - notification-service
      - search-service

    networks:
      - transcendence-network

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped

    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://root:rootpassword@auth-db:27017/auth_db?authSource=admin
      JWT_SECRET: your-jwt-secret-key
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

    depends_on:
      - auth-db

    networks:
      - transcendence-network

  core-service:
    build:
      context: ./backend/services/core-service
      dockerfile: Dockerfile
    container_name: core-service
    restart: unless-stopped

    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://core_user:core_password@core-db:5432/core_db
      TRANSLATION_API_URL: http://translation-service:8001/translate
      TRANSLATION_TIMEOUT_MS: 4000

    depends_on:
      - core-db
      - translation-service

    networks:
      - transcendence-network

  notification-service:
    build:
      context: ./backend/services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped

    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://notification_user:notification_password@notification-db:5432/notification_db

    depends_on:
      - notification-db

    networks:
      - transcendence-network

  search-service:
    build:
      context: ./backend/services/search-service
      dockerfile: Dockerfile
    container_name: search-service
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      PORT: 8000
      SEARCH_DATABASE_URL: postgresql://search_user:search_password@search-db:5432/search_db
      CORE_SERVICE_URL: http://core-service:3002
      LLM_PROVIDER: gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_EMBED_MODEL: gemini-embedding-001
      GEMINI_GEN_MODEL: gemini-2.5-flash
      OLLAMA_URL: http://host.docker.internal:11434

    depends_on:
      - search-db
      - core-service

    networks:
      - transcendence-network

  translation-service:
    build:
      context: ./backend/services/translation-service
      dockerfile: Dockerfile
    container_name: translation-service
    restart: unless-stopped

    ports:
      - "8001:8001"

    environment:
      PORT: 8001
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_GEN_MODEL: gemini-2.5-flash

    networks:
      - transcendence-network

volumes:
  core_pg_data:
  notification_pg_data:
  search_pg_data:

networks:
  transcendence-network:
    driver: bridge