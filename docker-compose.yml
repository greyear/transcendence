services:

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--configFile=/traefik/traefik.yml"

    ports:
      - "8080:80"
      - "8443:443"

    volumes:
      - "${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro"
      - "./traefik/traefik.yml:/traefik/traefik.yml:ro"
      - "./traefik/dynamic.yml:/traefik/dynamic.yml:ro"
      - "./certs:/certs:ro"

    networks:
      - transcendence-network

  auth-db:
    image: mongo:6
    container_name: auth-mongo
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword

    ports:
      - "27017:27017"

    networks:
      - transcendence-network

  core-db:
    image: postgres:15
    container_name: core-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: core_user
      POSTGRES_PASSWORD: core_password

    ports:
      - "5433:5432"

    volumes:
      - core_pg_data:/var/lib/postgresql/data
      - ./backend/infrastructure/postgres/core/01-init-core.sql:/docker-entrypoint-initdb.d/01-init-core.sql
      - ./backend/infrastructure/postgres/core/02-seed-core.sql:/docker-entrypoint-initdb.d/02-seed-core.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core_user -d core_db"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - transcendence-network

  search-db:
    image: pgvector/pgvector:pg15
    container_name: search-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: search_db
      POSTGRES_USER: search_user
      POSTGRES_PASSWORD: search_password

    ports:
      - "5435:5432"

    volumes:
      - search_pg_data:/var/lib/postgresql/data
      - ./backend/infrastructure/postgres/search/01-init-search.sql:/docker-entrypoint-initdb.d/01-init-search.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search_user -d search_db"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - transcendence-network

  api-gateway:
    build:
      context: ./backend/services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped

    expose:
      - "3000"

    environment:
      NODE_ENV: development
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      CORE_SERVICE_URL: http://core-service:3002
      SEARCH_SERVICE_URL: http://search-service:8000

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway-https.rule=Host(`localhost`) || Host(`127.0.0.1`)"
      - "traefik.http.routers.gateway-https.entrypoints=websecure"
      - "traefik.http.routers.gateway-https.tls=true"
      - "traefik.http.routers.gateway-https.service=gateway"
      - "traefik.http.services.gateway.loadbalancer.server.port=3000"

    depends_on:
      - auth-service
      - core-service
      - search-service

    networks:
      - transcendence-network

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped

    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://root:rootpassword@auth-db:27017/auth_db?authSource=admin
      JWT_SECRET: your-jwt-secret-key
      CORE_SERVICE_URL: http://core-service:3002
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

    depends_on:
      - auth-db

    networks:
      - transcendence-network

  core-service:
    build:
      context: ./backend/services/core-service
      dockerfile: Dockerfile
    container_name: core-service
    restart: unless-stopped

    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://core_user:core_password@core-db:5432/core_db
      TRANSLATION_API_URL: http://translation-service:8001/translate
      TRANSLATION_TIMEOUT_MS: 4000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env before starting services}

    depends_on:
      core-db:
        condition: service_healthy
      translation-service:
        condition: service_healthy

    networks:
      - transcendence-network

  search-service:
    build:
      context: ./backend/services/search-service
      dockerfile: Dockerfile
    container_name: search-service
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      PORT: 8000
      SEARCH_DATABASE_URL: postgresql://search_user:search_password@search-db:5432/search_db
      CORE_SERVICE_URL: http://core-service:3002
      CORE_SERVICE_TIMEOUT_MS: 10000
      LLM_PROVIDER: gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_EMBED_MODEL: gemini-embedding-001
      GEMINI_GEN_MODEL: gemini-2.5-flash
      OLLAMA_URL: http://host.docker.internal:11434
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env before starting services}
      SEARCH_PRUNE_INTERVAL_SECONDS: 300

    depends_on:
      search-db:
        condition: service_healthy
      core-service:
        condition: service_started

    networks:
      - transcendence-network

  translation-service:
    build:
      context: ./backend/services/translation-service
      dockerfile: Dockerfile
    container_name: translation-service
    restart: unless-stopped

    environment:
      PORT: 8001
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_GEN_MODEL: gemini-2.5-flash
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env before starting services}
      TRANSLATION_MAX_TEXT_LENGTH: 2000
      TRANSLATION_MAX_BATCH_ITEMS: 20
      TRANSLATION_MAX_TOTAL_CHARS: 12000

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - transcendence-network

volumes:
  core_pg_data:
  search_pg_data:

networks:
  transcendence-network:
    driver: bridge
