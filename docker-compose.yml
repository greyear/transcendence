services:

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--configFile=/traefik/traefik.yml"

    ports:
      - "8080:80"
      - "8443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/traefik.yml:/traefik/traefik.yml:ro"
      - "./traefik/dynamic.yml:/traefik/dynamic.yml:ro"
      - "./certs:/certs:ro"

    networks:
      - transcendence-network

  auth-db:
    image: mongo:6
    container_name: auth-mongo
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword

    ports:
      - "27017:27017"

    networks:
      - transcendence-network

  core-db:
    image: postgres:15
    container_name: core-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: core_user
      POSTGRES_PASSWORD: core_password

    ports:
      - "5433:5432"

    volumes:
      - core_pg_data:/var/lib/postgresql/data
      - ./backend/infrastructure/postgres/core/01-init-core.sql:/docker-entrypoint-initdb.d/01-init-core.sql
      - ./backend/infrastructure/postgres/core/02-seed-core.sql:/docker-entrypoint-initdb.d/02-seed-core.sql

    networks:
      - transcendence-network

  notification-db:
    image: postgres:15
    container_name: notification-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_password

    ports:
      - "5434:5432"

    volumes:
      - notification_pg_data:/var/lib/postgresql/data

    networks:
      - transcendence-network

  api-gateway:
    build:
      context: ./backend/services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped

    expose:
      - "3000"

    environment:
      NODE_ENV: development
      PORT: 3000
      CORS_ORIGIN: "http://localhost:5173"
      AUTH_SERVICE_URL: http://auth-service:3001
      CORE_SERVICE_URL: http://core-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3003

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway-https.rule=Host(`localhost`)"
      - "traefik.http.routers.gateway-https.entrypoints=websecure"
      - "traefik.http.routers.gateway-https.tls=true"
      - "traefik.http.services.gateway.loadbalancer.server.port=3000"

    depends_on:
      - auth-service
      - core-service
      - notification-service

    networks:
      - transcendence-network

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped

    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://root:rootpassword@auth-db:27017/auth_db?authSource=admin
      JWT_SECRET: your-jwt-secret-key
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

    depends_on:
      - auth-db

    networks:
      - transcendence-network

  core-service:
    build:
      context: ./backend/services/core-service
      dockerfile: Dockerfile
    container_name: core-service
    restart: unless-stopped

    environment:
      NODE_ENV: development
      PORT: 3002
      CORS_ORIGIN: "http://localhost:5173"
      DATABASE_URL: postgresql://core_user:core_password@core-db:5432/core_db

    depends_on:
      - core-db

    networks:
      - transcendence-network

  notification-service:
    build:
      context: ./backend/services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped

    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://notification_user:notification_password@notification-db:5432/notification_db

    depends_on:
      - notification-db

    networks:
      - transcendence-network

volumes:
  core_pg_data:
  notification_pg_data:

networks:
  transcendence-network:
    driver: bridge