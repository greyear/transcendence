name: Backend Tests (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'package.json'
      - '.github/workflows/test-backend.yml'
  push:
    branches: [gh_action_tests]
    paths:
      - 'backend/**'
      - 'package.json'
      - '.github/workflows/test-backend.yml'

jobs:
  test-core-service:
    name: Core Service Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/services/core-service/package-lock.json'

      - name: Install core-service dependencies
        run: npm ci
        working-directory: backend/services/core-service

      - name: Run Jest tests
        run: npm test
        working-directory: backend/services/core-service

  test-api-gateway:
    name: API Gateway Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/services/api-gateway/package-lock.json'

      - name: Install api-gateway dependencies
        run: npm ci
        working-directory: backend/services/api-gateway

      - name: Run Jest tests
        run: npm test
        working-directory: backend/services/api-gateway

  test-summary:
    name: All Tests Passed ✓
    needs: [test-core-service, test-api-gateway]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-core-service.result }}" = "failure" ] || [ "${{ needs.test-api-gateway.result }}" = "failure" ]; then
            echo "❌ Some tests failed"
            exit 1
          fi
          echo "✅ All tests passed!"
