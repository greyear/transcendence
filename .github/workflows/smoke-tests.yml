name: Backend Smoke Tests (Main)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/smoke-tests.yml'
  workflow_dispatch:

env:
  INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}

jobs:
  smoke-tests:
    name: Smoke Tests with Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Generate certificates
        run: |
          rm -rf certs
          mkdir certs
          make certs

      - name: Create .env file
        run: |
          cat > .env << EOF
          MONGODB_AUTH_URI=${{ secrets.MONGODB_AUTH_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          SEARCH_SERVICE_URL=${{ secrets.SEARCH_SERVICE_URL }}
          SEARCH_REINDEX_TIMEOUT_MS=${{ secrets.SEARCH_REINDEX_TIMEOUT_MS }}
          TRANSLATION_API_URL=${{ secrets.TRANSLATION_API_URL }}
          TRANSLATION_TIMEOUT_MS=${{ secrets.TRANSLATION_TIMEOUT_MS }}
          CORE_SERVICE_TIMEOUT_MS=${{ secrets.CORE_SERVICE_TIMEOUT_MS }}
          GEMINI_GEN_MODEL=${{ secrets.GEMINI_GEN_MODEL }}
          MONGO_ROOT_USERNAME=${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}
          EOF

      - name: Start services with docker compose
        run: docker compose up -d

      - name: Wait for API Gateway to be ready
        run: |
          echo "Waiting for API Gateway to be ready..."
          for i in {1..60}; do
            if curl -f -k https://localhost:8443/health >/dev/null 2>&1; then
              echo "✓ API Gateway is ready"
              exit 0
            fi
            echo "Attempt $i/60: waiting for API Gateway..."
            sleep 2
          done
          echo "❌ API Gateway did not become ready in time"
          docker compose logs
          exit 1

      - name: Run smoke tests
        run: npm test

      - name: Cleanup docker services
        if: always()
        run: docker compose down -v
